services:
  api:
    build:
      context: .
      dockerfile: premier-league-api/Dockerfile
    container_name: premier-league-api
    working_dir: /app/premier-league-api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py sync_teams_from_history &&
             python manage.py gunicorn premier_league_api.wsgi:application --bind 0.0.0.0:8000 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: premier-league-frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
