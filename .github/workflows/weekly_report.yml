# ─────────────────────────────────────────────────────────────
# Runs google_sheets_reporter.py every Monday at 8:00 AM UTC.
# Add these secrets to your repo → Settings → Secrets:
#   GOOGLE_SERVICE_ACCOUNT_KEY   ← contents of your service account JSON
#   SPREADSHEET_ID               ← the Google Sheet ID from its URL
# ─────────────────────────────────────────────────────────────

name: Weekly Sheets Report

on:
  schedule:
    # Run every Monday at 8AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-and-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pandas
      
      - name: Run Google Sheets Reporter
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || '1m7192nwRRpGiU-UCqf2IxImNOMUL98cKawnXae1i_vs' }}
        run: |
          python automation/google_sheets_reporter.py
      
      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: report_*.csv
          retention-days: 30
